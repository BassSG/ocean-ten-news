name: Update Trade Journal

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ocean-ten-news-trade-journal
  cancel-in-progress: false

jobs:
  update-journal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Refresh candle cache first
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python scripts/update_fmp_cache.py

      - name: Build trade journal
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python scripts/build_trade_journal.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fmp-candles-cache.json data/trade-journal-latest.json data/trade-journal-history.jsonl data/order-state.json
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore(journal): update state machine journal + candle cache"
          git push
