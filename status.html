<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦐 Ocean Ten Team — Live Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Prompt:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2128;
            --gold: #f0b90b;
            --gold-dim: #a8880a;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
            --gray: #6e7681;
            --blue-deep: #1a3a5c;
            --blue-steel: #3d5a80;
            --blue-ocean: #0ea5e9;
            --green-sea: #22c55e;
            --orange-red: #f97316;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px;
            position: relative;
        }

        .header h1 {
            font-family: 'Prompt', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold) 0%, #ffd700 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(240, 185, 11, 0.3);
            animation: shimmer 3s ease-in-out infinite;
        }

        .header-time {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .header-time span {
            color: var(--gold);
            font-weight: 600;
        }

        @keyframes shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        /* Section Title */
        .section-title {
            font-family: 'Prompt', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--gold);
            border-radius: 2px;
        }

        /* Agent Cards Grid */
        .agents-section {
            margin-bottom: 40px;
        }

        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .agent-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(240, 185, 11, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .agent-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3), 0 0 20px rgba(240, 185, 11, 0.1);
        }

        .agent-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--agent-color, var(--gold)), transparent);
        }

        /* Avatar */
        .avatar {
            font-size: 4rem;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
            position: relative;
        }

        .avatar::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 10px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: shadow 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes shadow {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.3; }
            50% { transform: translateX(-50%) scale(0.8); opacity: 0.2; }
        }

        /* Staggered float animations */
        .agent-card:nth-child(1) .avatar { animation-delay: 0s; }
        .agent-card:nth-child(2) .avatar { animation-delay: 0.5s; }
        .agent-card:nth-child(3) .avatar { animation-delay: 1s; }
        .agent-card:nth-child(4) .avatar { animation-delay: 1.5s; }
        .agent-card:nth-child(5) .avatar { animation-delay: 2s; }

        /* Name Badge */
        .agent-name {
            font-family: 'Prompt', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 15px;
            color: var(--text-primary);
        }

        .agent-role {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Status Indicator */
        .status-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.working { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .status-dot.thinking { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); }
        .status-dot.resting { background: var(--red); box-shadow: 0 0 10px var(--red); }
        .status-dot.idle { background: var(--gray); box-shadow: 0 0 10px var(--gray); }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        .status-text {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-text.working { color: var(--green); }
        .status-text.thinking { color: var(--yellow); }
        .status-text.resting { color: var(--red); }
        .status-text.idle { color: var(--gray); }

        /* Activity Text */
        .activity-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 10px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
        }

        .activity-text.thai {
            font-family: 'Prompt', sans-serif;
        }

        /* Progress Bar */
        .progress-container {
            margin-top: 15px;
        }

        .progress-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--agent-color, var(--gold)), var(--gold));
            border-radius: 3px;
            transition: width 1s ease;
        }

        /* Standby Section */
        .standby-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
        }

        .standby-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .standby-card:hover {
            background: var(--bg-card);
            border-color: rgba(240, 185, 11, 0.2);
        }

        .standby-avatar {
            font-size: 2.5rem;
            animation: float 4s ease-in-out infinite;
        }

        .standby-card:nth-child(1) .standby-avatar { animation-delay: 0s; }
        .standby-card:nth-child(2) .standby-avatar { animation-delay: 0.8s; }
        .standby-card:nth-child(3) .standby-avatar { animation-delay: 1.6s; }
        .standby-card:nth-child(4) .standby-avatar { animation-delay: 2.4s; }
        .standby-card:nth-child(5) .standby-avatar { animation-delay: 3.2s; }

        .standby-name {
            font-family: 'Prompt', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 8px;
        }

        .standby-role {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .standby-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 8px;
        }

        .standby-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gray);
            animation: pulse 3s ease-in-out infinite;
        }

        .standby-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Activity Feed */
        .activity-feed {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(240, 185, 11, 0.1);
        }

        .feed-header {
            font-family: 'Prompt', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .feed-list {
            max-height: 200px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--gold) var(--bg-primary);
        }

        .feed-list::-webkit-scrollbar {
            width: 6px;
        }

        .feed-list::-webkit-scrollbar-track {
            background: var(--bg-primary);
            border-radius: 3px;
        }

        .feed-list::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 3px;
        }

        .feed-item {
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: flex-start;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .feed-item:last-child {
            border-bottom: none;
        }

        .feed-emoji {
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .feed-content {
            flex: 1;
        }

        .feed-agent {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--gold);
        }

        .feed-action {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .feed-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
            opacity: 0.7;
            flex-shrink: 0;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .footer span {
            color: var(--gold);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .agents-grid {
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            }

            .standby-grid {
                grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            }
        }

        /* Breathing animation for cards */
        .agent-card {
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 0 rgba(240, 185, 11, 0); }
            50% { box-shadow: 0 0 20px rgba(240, 185, 11, 0.1); }
        }

        .agent-card:nth-child(1) { animation-delay: 0s; }
        .agent-card:nth-child(2) { animation-delay: 1s; }
        .agent-card:nth-child(3) { animation-delay: 2s; }
        .agent-card:nth-child(4) { animation-delay: 3s; }
        .agent-card:nth-child(5) { animation-delay: 4s; }

        /* Sparkle effect */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            animation: sparkle 2s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🦐 Ocean Ten Team — Live Simulator</h1>
            <div class="header-time">
                <span id="current-time"></span> | <span id="current-date"></span>
            </div>
        </header>

        <!-- Active 5 -->
        <section class="agents-section">
            <h2 class="section-title">🐋 Active 5 — Currently Working</h2>
            <div class="agents-grid" id="active-agents">
                <!-- Agents will be populated by JS -->
            </div>
        </section>

        <!-- Standby 5 -->
        <section class="agents-section">
            <h2 class="section-title">🦑 Standby 5 — On Call</h2>
            <div class="standby-grid" id="standby-agents">
                <!-- Standby agents will be populated by JS -->
            </div>
        </section>

        <!-- Activity Feed -->
        <section class="activity-feed">
            <div class="feed-header">📋 Live Activity Feed</div>
            <div class="feed-list" id="feed-list">
                <!-- Feed items will be populated by JS -->
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            🌊 Ocean Ten Team Simulator | Auto-refresh every <span>10</span> seconds | Thailand (GMT+7)
        </footer>
    </div>

    <script>
        // Agent Data
        const activeAgents = [
            {
                id: 'whale',
                emoji: '🐋',
                name: 'คุณวาฬ',
                role: 'The Mastermind',
                color: '#1a3a5c',
                activities: [
                    { type: 'working', text: 'กำลังวิเคราะห์ตลาดทองคำ...', progress: 75 },
                    { type: 'thinking', text: 'คิดแผนกลยุทธ์ใหม่...', progress: 45 },
                    { type: 'resting', text: 'นอนพักผ่อน... 💤', progress: 0 }
                ]
            },
            {
                id: 'shark',
                emoji: '🦈',
                name: 'พี่ฉลาม',
                role: 'Trading Analyst',
                color: '#3d5a80',
                activities: [
                    { type: 'working', text: 'กำลังดู Gold Charts...', progress: 88 },
                    { type: 'thinking', text: 'สแกนข่าวตลาด US...', progress: 30 },
                    { type: 'resting', text: 'ว่ายน้ำพักผ่อน... 🌊', progress: 0 }
                ]
            },
            {
                id: 'dolphin',
                emoji: '🐬',
                name: 'น้องโลมา',
                role: 'Tech Executor',
                color: '#0ea5e9',
                activities: [
                    { type: 'working', text: 'เขียนโค้ดใหม่...', progress: 60 },
                    { type: 'thinking', text: 'Deploy ขึ้น GitHub...', progress: 92 },
                    { type: 'resting', text: 'กระโดดเล่นในทะเล... 🐟', progress: 0 }
                ]
            },
            {
                id: 'turtle',
                emoji: '🐢',
                name: 'ลุงเต่า',
                role: 'Routine Manager',
                color: '#22c55e',
                activities: [
                    { type: 'working', text: 'เช็ค PM2.5 ศาลายา...', progress: 55 },
                    { type: 'thinking', text: 'ดูสภาพจราจร...', progress: 40 },
                    { type: 'resting', text: 'นอนตะกอนทราย... 🏖️', progress: 0 }
                ]
            },
            {
                id: 'crab',
                emoji: '🦀',
                name: 'พี่ปู',
                role: 'System Guard',
                color: '#f97316',
                activities: [
                    { type: 'working', text: 'กำลังตรวจสอบระบบ...', progress: 70 },
                    { type: 'thinking', text: 'Backup ข้อมูล...', progress: 35 },
                    { type: 'resting', text: 'แช่น้ำเย็นๆ... 🦀', progress: 0 }
                ]
            }
        ];

        const standbyAgents = [
            { emoji: '🦑', name: 'น้องหมึก', role: 'Deep Research' },
            { emoji: '🐡', name: 'น้องปักเป้า', role: 'QA Reviewer' },
            { emoji: '🐙', name: 'พี่หมึกสาย', role: 'Tech Support' },
            { emoji: '🐎', name: 'น้องม้าน้ำ', role: 'Email/TTS' },
            { emoji: '🌟', name: 'คุณปลาดาว', role: 'Browser Automation' }
        ];

        // Activity feed data
        let feedItems = [];
        const feedEmojis = ['📊', '🔍', '💻', '🛡️', '📈', '🎯', '⚡', '🔄', '📁', '🌐'];

        // Current states for each agent
        const agentStates = {};

        // Initialize states
        activeAgents.forEach(agent => {
            agentStates[agent.id] = {
                currentActivity: 0,
                progress: Math.floor(Math.random() * 50) + 20
            };
        });

        // Get time-based activity
        function getTimeBasedActivity(agent, hour) {
            // Morning (6-12): Working
            // Afternoon (12-18): Mixed
            // Evening (18-22): Thinking
            // Night (22-6): Resting
            
            if (hour >= 6 && hour < 12) {
                return 0; // Working
            } else if (hour >= 12 && hour < 18) {
                return Math.random() > 0.5 ? 0 : 1; // Working or Thinking
            } else if (hour >= 18 && hour < 22) {
                return 1; // Thinking
            } else {
                return 2; // Resting
            }
        }

        // Update time display
        function updateTime() {
            const now = new Date();
            const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            
            document.getElementById('current-time').textContent = now.toLocaleTimeString('th-TH', options);
            document.getElementById('current-date').textContent = now.toLocaleDateString('th-TH', dateOptions);
            
            return now.getHours();
        }

        // Render active agents
        function renderActiveAgents(hour) {
            const container = document.getElementById('active-agents');
            container.innerHTML = '';

            activeAgents.forEach((agent, index) => {
                const state = agentStates[agent.id];
                const activityIndex = getTimeBasedActivity(agent, hour);
                const activity = agent.activities[activityIndex];
                
                // Update progress randomly
                if (activity.type !== 'resting') {
                    state.progress = Math.min(100, state.progress + Math.floor(Math.random() * 5));
                    if (state.progress >= 100) {
                        state.progress = Math.floor(Math.random() * 20);
                    }
                } else {
                    state.progress = 0;
                }

                const card = document.createElement('div');
                card.className = 'agent-card';
                card.style.setProperty('--agent-color', agent.color);
                card.innerHTML = `
                    <div class="avatar">${agent.emoji}</div>
                    <div class="agent-name">${agent.name}</div>
                    <div class="agent-role">${agent.role}</div>
                    <div class="status-row">
                        <div class="status-dot ${activity.type}"></div>
                        <span class="status-text ${activity.type}">${activity.type === 'working' ? 'Working' : activity.type === 'thinking' ? 'Thinking' : 'Resting'}</span>
                    </div>
                    <div class="activity-text thai">${activity.text}</div>
                    <div class="progress-container">
                        <div class="progress-label">
                            <span>Progress</span>
                            <span>${state.progress}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${state.progress}%"></div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Render standby agents
        function renderStandbyAgents() {
            const container = document.getElementById('standby-agents');
            container.innerHTML = '';

            standbyAgents.forEach((agent, index) => {
                const card = document.createElement('div');
                card.className = 'standby-card';
                card.innerHTML = `
                    <div class="standby-avatar">${agent.emoji}</div>
                    <div class="standby-name">${agent.name}</div>
                    <div class="standby-role">${agent.role}</div>
                    <div class="standby-status">
                        <div class="standby-dot" style="animation-delay: ${index * 0.3}s"></div>
                        <span class="standby-text">Standby</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Add feed item
        function addFeedItem() {
            const agent = activeAgents[Math.floor(Math.random() * activeAgents.length)];
            const activity = agent.activities[Math.floor(Math.random() * agent.activities.length)];
            const emoji = feedEmojis[Math.floor(Math.random() * feedEmojis.length)];
            const now = new Date();
            const time = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });

            feedItems.unshift({
                emoji,
                agent: agent.name,
                action: activity.text,
                time
            });

            // Keep only last 20 items
            if (feedItems.length > 20) {
                feedItems.pop();
            }

            renderFeed();
        }

        // Render feed
        function renderFeed() {
            const container = document.getElementById('feed-list');
            container.innerHTML = '';

            feedItems.forEach((item, index) => {
                const feedItem = document.createElement('div');
                feedItem.className = 'feed-item';
                feedItem.style.animationDelay = `${index * 0.05}s`;
                feedItem.innerHTML = `
                    <span class="feed-emoji">${item.emoji}</span>
                    <div class="feed-content">
                        <div class="feed-agent">${item.agent}</div>
                        <div class="feed-action">${item.action}</div>
                    </div>
                    <span class="feed-time">${item.time}</span>
                `;
                container.appendChild(feedItem);
            });
        }

        // Initialize
        function init() {
            updateTime();
            const hour = updateTime();
            renderActiveAgents(hour);
            renderStandbyAgents();
            
            // Initial feed items
            for (let i = 0; i < 5; i++) {
                addFeedItem();
            }

            // Update every 10 seconds
            setInterval(() => {
                const currentHour = updateTime();
                renderActiveAgents(currentHour);
                addFeedItem();
            }, 10000);
        }

        // Start
        init();
    </script>
</body>
</html>
