<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏢 Ocean Ten — Live Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Prompt:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2128;
            --gold: #f0b90b;
            --gold-dim: #a8880a;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
            --gray: #6e7681;
            --blue-deep: #1a3a5c;
            --blue-steel: #3d5a80;
            --blue-ocean: #0ea5e9;
            --green-sea: #22c55e;
            --orange-red: #f97316;
            --purple: #a855f7;
            --pink: #ec4899;
            --cyan: #06b6d4;
            --teal: #14b8a6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(240,185,11,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(240,185,11,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .sim-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background: var(--bg-card);
            border: 1px solid rgba(240,185,11,0.15);
            border-radius: 16px;
            margin-bottom: 24px;
        }

        .sim-header h1 {
            font-family: 'Prompt', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold) 0%, #ffd700 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sim-time {
            font-family: 'Prompt', sans-serif;
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .sim-time span { color: var(--gold); font-weight: 600; }

        /* Section Labels */
        .section-label {
            font-family: 'Prompt', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        /* ===== ROOM CARDS ===== */
        .rooms-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .room {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 16px;
            position: relative;
            overflow: hidden;
            min-height: 240px;
        }

        .room::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--room-color);
            opacity: 0.8;
        }

        .room::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background: linear-gradient(to top, var(--room-color), transparent);
            opacity: 0.08;
            pointer-events: none;
        }

        .room-header {
            font-family: 'Prompt', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--room-color);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .room-name {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Room Scene - where character lives */
        .room-scene {
            width: 100%;
            height: 90px;
            background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.02) 100%);
            border-radius: 8px;
            margin: 8px 0;
            position: relative;
            overflow: hidden;
        }

        /* Character base */
        .character {
            position: absolute;
            font-size: 2.2rem;
            transition: left 2s ease-in-out;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
        }

        /* Ground/floor line */
        .room-scene::after {
            content: '';
            position: absolute;
            bottom: 12px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: rgba(255,255,255,0.06);
            border-radius: 1px;
        }

        /* Task text */
        .room-task {
            font-family: 'Prompt', sans-serif;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: center;
            margin: 8px 0;
            min-height: 18px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Progress bar */
        .room-progress {
            margin-top: 6px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease, background 0.3s ease;
        }

        /* Status indicator */
        .room-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.working { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .status-dot.thinking { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
        .status-dot.resting { background: var(--red); box-shadow: 0 0 8px var(--red); }

        .status-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-label.working { color: var(--green); }
        .status-label.thinking { color: var(--yellow); }
        .status-label.resting { color: var(--red); }

        /* ===== CHARACTER ANIMATIONS ===== */

        /* Whale - floats up/down slowly */
        .char-whale {
            animation: whaleFloat 4s ease-in-out infinite;
        }
        @keyframes whaleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Shark - swims left/right */
        .char-shark {
            animation: sharkSwim 3s ease-in-out infinite;
        }
        @keyframes sharkSwim {
            0%, 100% { transform: translateX(0) scaleX(1); }
            25% { transform: translateX(20px) scaleX(1); }
            50% { transform: translateX(0) scaleX(-1); }
            75% { transform: translateX(-20px) scaleX(-1); }
        }

        /* Dolphin - jumps/bounces */
        .char-dolphin {
            animation: dolphinJump 2.5s ease-in-out infinite;
        }
        @keyframes dolphinJump {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            30% { transform: translateY(-25px) rotate(-10deg); }
            50% { transform: translateY(-30px) rotate(0deg); }
            70% { transform: translateY(-25px) rotate(10deg); }
        }

        /* Turtle - walks slowly */
        .char-turtle {
            animation: turtleWalk 6s linear infinite;
        }
        @keyframes turtleWalk {
            0% { transform: translateX(-15px); }
            50% { transform: translateX(15px); }
            100% { transform: translateX(-15px); }
        }

        /* Crab - scuttles sideways */
        .char-crab {
            animation: crabScuttle 2s ease-in-out infinite;
        }
        @keyframes crabScuttle {
            0%, 100% { transform: translateX(0) scaleX(1); }
            50% { transform: translateX(15px) scaleX(-1); }
        }

        /* Squid - sways/squishes */
        .char-squid {
            animation: squidSway 3s ease-in-out infinite;
        }
        @keyframes squidSway {
            0%, 100% { transform: scaleX(1) scaleY(1); }
            50% { transform: scaleX(1.1) scaleY(0.9); }
        }

        /* Pufferfish - inflates */
        .char-pufferfish {
            animation: pufferInflate 4s ease-in-out infinite;
        }
        @keyframes pufferInflate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* Octopus - reaches/taps */
        .char-octopus {
            animation: octopusReach 2s ease-in-out infinite;
        }
        @keyframes octopusReach {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(5deg); }
        }

        /* Seahorse - trots */
        .char-seahorse {
            animation: seahorseTrot 3s ease-in-out infinite;
        }
        @keyframes seahorseTrot {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }

        /* Starfish - pulses/glows */
        .char-starfish {
            animation: starfishPulse 2s ease-in-out infinite;
        }
        @keyframes starfishPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 4px rgba(240,185,11,0.3)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 12px rgba(240,185,11,0.6)); }
        }

        /* Pulse animation */
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }

        /* ===== STANDBY ROOMS (smaller) ===== */
        .standby-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .standby-room {
            background: var(--bg-secondary);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 12px;
            position: relative;
            overflow: hidden;
            min-height: 130px;
        }

        .standby-room::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--room-color);
            opacity: 0.5;
        }

        .standby-header {
            font-family: 'Prompt', sans-serif;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--room-color);
            text-align: center;
            margin-bottom: 6px;
        }

        .standby-scene {
            width: 100%;
            height: 55px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .standby-character {
            font-size: 1.6rem;
            animation: float 4s ease-in-out infinite;
        }

        .standby-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 6px;
        }

        .standby-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gray);
            animation: pulse 3s ease-in-out infinite;
        }

        .standby-label {
            font-size: 0.6rem;
            color: var(--text-secondary);
        }

        /* Float animation for standby */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* ===== ACTIVITY FEED ===== */
        .feed-section {
            background: var(--bg-card);
            border: 1px solid rgba(240,185,11,0.1);
            border-radius: 16px;
            padding: 20px;
        }

        .feed-header {
            font-family: 'Prompt', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gold);
        }

        .feed-list {
            max-height: 180px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--gold) var(--bg-primary);
        }

        .feed-list::-webkit-scrollbar { width: 4px; }
        .feed-list::-webkit-scrollbar-track { background: var(--bg-primary); border-radius: 2px; }
        .feed-list::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

        .feed-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            animation: slideIn 0.3s ease;
        }

        .feed-item:last-child { border-bottom: none; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .feed-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
            min-width: 45px;
        }

        .feed-emoji { font-size: 1rem; }

        .feed-text {
            flex: 1;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .feed-text strong {
            color: var(--gold);
            font-weight: 600;
        }

        .feed-progress {
            font-size: 0.7rem;
            color: var(--text-secondary);
            min-width: 40px;
            text-align: right;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .footer span { color: var(--gold); }

        /* Responsive */
        @media (max-width: 1200px) {
            .rooms-container { grid-template-columns: repeat(3, 1fr); }
            .standby-container { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            .rooms-container { grid-template-columns: repeat(2, 1fr); }
            .standby-container { grid-template-columns: repeat(2, 1fr); }
            .sim-header { flex-direction: column; gap: 10px; text-align: center; }
        }

        @media (max-width: 480px) {
            .rooms-container { grid-template-columns: 1fr; }
            .standby-container { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="sim-header">
            <h1>🏢 Ocean Ten — Live Simulator</h1>
            <div class="sim-time">🕒 <span id="clock">--:--</span> · <span id="date">--</span></div>
        </div>

        <!-- Active 5 -->
        <div class="section-label">🐋 Active 5 — Working</div>
        <div class="rooms-container" id="active-rooms"></div>

        <!-- Standby 5 -->
        <div class="section-label">🦑 Standby 5 — On Call</div>
        <div class="standby-container" id="standby-rooms"></div>

        <!-- Activity Feed -->
        <div class="feed-section">
            <div class="feed-header">📋 Activity Feed</div>
            <div class="feed-list" id="feed-list"></div>
        </div>

        <!-- Footer -->
        <div class="footer">Ocean Ten Simulator · Auto-refresh every <span>15s</span> · GMT+7</div>
    </div>

    <script>
        // ===== AGENT DATA =====
        const activeAgents = [
            {
                id: 'whale', emoji: '🐋', name: 'ห้องวาฬ', role: 'Strategy Room',
                color: '#1a3a5c', charClass: 'char-whale',
                activities: ['วิเคราะห์ตลาดทองคำ', 'คิดแผนกลยุทธ์ใหม่', 'ประเมินความเสี่ยง']
            },
            {
                id: 'shark', emoji: '🦈', name: 'ห้องฉลาม', role: 'Trading Floor',
                color: '#3d5a80', charClass: 'char-shark',
                activities: ['ดู Gold Charts', 'สแกนข่าวตลาด US', 'วิเคราะห์ DXY']
            },
            {
                id: 'dolphin', emoji: '🐬', name: 'ห้องโลมา', role: 'Dev Lab',
                color: '#0ea5e9', charClass: 'char-dolphin',
                activities: ['เขียนโค้ด', 'Deploy ขึ้น GitHub', 'แก้ Bug']
            },
            {
                id: 'turtle', emoji: '🐢', name: 'ห้องเต่า', role: 'Routine Office',
                color: '#22c55e', charClass: 'char-turtle',
                activities: ['เช็ค PM2.5', 'ดูสภาพจราจร', 'ตรวจสอบอากาศ']
            },
            {
                id: 'crab', emoji: '🦀', name: 'ห้องปู', role: 'Security Room',
                color: '#f97316', charClass: 'char-crab',
                activities: ['ตรวจสอบระบบ', 'Backup ข้อมูล', 'Security Scan']
            }
        ];

        const standbyAgents = [
            { emoji: '🦑', name: 'ห้องหมึก', role: 'Research Lab', color: '#a855f7', charClass: 'char-squid' },
            { emoji: '🐡', name: 'ห้องปักเป้า', role: 'QA Corner', color: '#ec4899', charClass: 'char-pufferfish' },
            { emoji: '🐙', name: 'ห้องหมึกสาย', role: 'Support Desk', color: '#06b6d4', charClass: 'char-octopus' },
            { emoji: '🐎', name: 'ห้องม้าน้ำ', role: 'Communication Hub', color: '#14b8a6', charClass: 'char-seahorse' },
            { emoji: '🌟', name: 'ห้องปลาดาว', role: 'Browser Station', color: '#f0b90b', charClass: 'char-starfish' }
        ];

        // ===== STATE =====
        const agentState = {};
        activeAgents.forEach(a => {
            agentState[a.id] = {
                activityIndex: Math.floor(Math.random() * a.activities.length),
                progress: Math.floor(Math.random() * 60) + 20,
                status: 'working'
            };
        });

        let feedItems = [];

        // ===== TIME-BASED BEHAVIOR =====
        function getTimeStatus(hour) {
            if (hour >= 6 && hour < 10) return 'working';      // Morning rush
            if (hour >= 10 && hour < 15) return Math.random() > 0.4 ? 'working' : 'thinking';
            if (hour >= 15 && hour < 18) return 'working';     // Afternoon
            if (hour >= 18 && hour < 22) return 'thinking';    // Evening wrap
            return 'resting';                                   // Night
        }

        function getProgressSpeed(status) {
            if (status === 'working') return 8;
            if (status === 'thinking') return 3;
            return 0;
        }

        function getProgressColor(p) {
            if (p < 30) return '#d29922'; // Yellow
            if (p < 70) return '#0ea5e9'; // Blue
            return '#3fb950';              // Green
        }

        // ===== CLOCK =====
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false });
            const dateStr = now.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
            document.getElementById('clock').textContent = timeStr;
            document.getElementById('date').textContent = dateStr + ' ' + now.getFullYear();
            return now.getHours();
        }

        // ===== RENDER ACTIVE ROOMS =====
        function renderActiveRooms(hour) {
            const container = document.getElementById('active-rooms');
            container.innerHTML = '';
            const status = getTimeStatus(hour);

            activeAgents.forEach(agent => {
                const state = agentState[agent.id];
                state.status = status;

                // Progress update
                if (status !== 'resting') {
                    state.progress = Math.min(100, state.progress + getProgressSpeed(status));
                    if (state.progress >= 100) {
                        state.activityIndex = (state.activityIndex + 1) % agent.activities.length;
                        state.progress = 0;
                        addFeedItem(agent, state, true);
                    }
                } else {
                    state.progress = 0;
                }

                const room = document.createElement('div');
                room.className = 'room';
                room.style.setProperty('--room-color', agent.color);
                room.innerHTML = `
                    <div class="room-header">${agent.emoji} ${agent.name}</div>
                    <div class="room-name">${agent.role}</div>
                    <div class="room-scene">
                        <div class="character ${agent.charClass}">${agent.emoji}</div>
                    </div>
                    <div class="room-task">${agent.activities[state.activityIndex]}</div>
                    <div class="room-progress">
                        <div class="progress-info">
                            <span>Progress</span>
                            <span>${state.progress}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width:${state.progress}%;background:${getProgressColor(state.progress)}"></div>
                        </div>
                    </div>
                    <div class="room-status">
                        <div class="status-dot ${status}"></div>
                        <span class="status-label ${status}">${status === 'working' ? 'Working' : status === 'thinking' ? 'Thinking' : 'Resting'}</span>
                    </div>
                `;
                container.appendChild(room);
            });
        }

        // ===== RENDER STANDBY ROOMS =====
        function renderStandbyRooms() {
            const container = document.getElementById('standby-rooms');
            container.innerHTML = '';

            standbyAgents.forEach((agent, i) => {
                const room = document.createElement('div');
                room.className = 'standby-room';
                room.style.setProperty('--room-color', agent.color);
                room.innerHTML = `
                    <div class="standby-header">${agent.emoji} ${agent.name}</div>
                    <div class="standby-scene">
                        <div class="standby-character ${agent.charClass}" style="animation-delay:${i*0.4}s">${agent.emoji}</div>
                    </div>
                    <div class="standby-status">
                        <div class="standby-dot" style="animation-delay:${i*0.3}s"></div>
                        <span class="standby-label">${agent.role}</span>
                    </div>
                `;
                container.appendChild(room);
            });
        }

        // ===== ACTIVITY FEED =====
        function addFeedItem(agent, state, completed = false) {
            const now = new Date();
            const time = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false });

            if (completed) {
                feedItems.unshift({
                    time,
                    emoji: '✅',
                    text: `<strong>${agent.name}</strong> เสร็จแล้ว: ${agent.activities[state.activityIndex]}`
                });
            } else {
                const statuses = ['📊', '🔍', '💻', '🛡️', '📈', '⚡'];
                feedItems.unshift({
                    time,
                    emoji: statuses[Math.floor(Math.random() * statuses.length)],
                    text: `<strong>${agent.name}</strong> กำลังทำ: ${agent.activities[state.activityIndex]}`
                });
            }

            if (feedItems.length > 15) feedItems.pop();
            renderFeed();
        }

        function renderFeed() {
            const container = document.getElementById('feed-list');
            container.innerHTML = feedItems.map(item => `
                <div class="feed-item">
                    <span class="feed-time">${item.time}</span>
                    <span class="feed-emoji">${item.emoji}</span>
                    <span class="feed-text">${item.text}</span>
                </div>
            `).join('');
        }

        // ===== INIT =====
        function init() {
            const hour = updateClock();
            renderActiveRooms(hour);
            renderStandbyRooms();

            // Initial feed items
            activeAgents.slice(0, 3).forEach(agent => {
                addFeedItem(agent, agentState[agent.id]);
            });

            // Update every 15 seconds
            setInterval(() => {
                const h = updateClock();
                renderActiveRooms(h);
                if (Math.random() > 0.5) {
                    const randAgent = activeAgents[Math.floor(Math.random() * activeAgents.length)];
                    addFeedItem(randAgent, agentState[randAgent.id]);
                }
            }, 15000);
        }

        // Start
        init();
    </script>
</body>
</html>
